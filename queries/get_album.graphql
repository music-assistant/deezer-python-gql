query GetAlbum($albumId: String!) {
  album(albumId: $albumId) {
    ...AlbumFields
    duration
    tracksCount
    discsCount
    isTakenDown
    fallback {
      id
      displayTitle
    }
    tracks(first: 50) {
      edges {
        cursor
        node {
          ...TrackFields
        }
      }
      pageInfo {
        ...PageInfoFields
      }
    }
    url {
      ... on Url {
        webUrl
      }
    }
  }
}
