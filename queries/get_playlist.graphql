query GetPlaylist($playlistId: String!) {
  playlist(playlistId: $playlistId) {
    ...PlaylistFields
    isPrivate
    isCollaborative
    estimatedDuration
    tracks(first: 50) {
      edges {
        cursor
        node {
          ...TrackFields
        }
      }
      pageInfo {
        ...PageInfoFields
      }
    }
  }
}
