query GetTrack($trackId: String!) {
  track(trackId: $trackId) {
    ...TrackFields
    isAtmos
    releaseDate
    media {
      id
      version
      token {
        payload
        expiresAt
      }
      estimatedSizes {
        MP3_MISC
        MP3_128
        MP3_320
        FLAC
      }
      rights {
        ads {
          available
        }
        sub {
          available
        }
      }
    }
    lyrics {
      synchronizedLines {
        lrcTimestamp
        line
        milliseconds
        duration
      }
      text
      copyright
      writers
    }
  }
}
