# Get the current user's favorite artists (paginated).

query GetFavoriteArtists($first: Int = 50, $after: String) {
  me {
    userFavorites {
      artists(first: $first, after: $after) {
        edges {
          cursor
          favoritedAt
          node {
            ...ArtistFields
          }
        }
        pageInfo {
          ...PageInfoFields
        }
      }
    }
  }
}
