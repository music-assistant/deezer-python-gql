# Get the current user's favorite albums (paginated).

query GetFavoriteAlbums($first: Int = 50, $after: String) {
  me {
    userFavorites {
      albums(first: $first, after: $after) {
        edges {
          cursor
          node {
            ...AlbumFields
          }
        }
        pageInfo {
          ...PageInfoFields
        }
      }
    }
  }
}
