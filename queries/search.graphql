query Search(
  $query: String!
  $tracksFirst: Int = 20
  $albumsFirst: Int = 20
  $artistsFirst: Int = 20
  $playlistsFirst: Int = 10
  $livestreamsFirst: Int = 0
  $podcastsFirst: Int = 0
  $podcastEpisodesFirst: Int = 0
) {
  search(query: $query) {
    results {
      tracks(first: $tracksFirst) {
        edges {
          cursor
          node {
            ...TrackFields
          }
        }
        pageInfo {
          ...PageInfoFields
        }
      }
      albums(first: $albumsFirst) {
        edges {
          cursor
          node {
            ...AlbumFields
          }
        }
        pageInfo {
          ...PageInfoFields
        }
      }
      artists(first: $artistsFirst) {
        edges {
          cursor
          node {
            ...ArtistFields
          }
        }
        pageInfo {
          ...PageInfoFields
        }
      }
      playlists(first: $playlistsFirst) {
        edges {
          cursor
          node {
            ...PlaylistFields
          }
        }
        pageInfo {
          ...PageInfoFields
        }
      }
      livestreams(first: $livestreamsFirst) {
        edges {
          cursor
          node {
            ...LivestreamFields
          }
        }
        pageInfo {
          ...PageInfoFields
        }
      }
      podcasts(first: $podcastsFirst) {
        edges {
          cursor
          node {
            ...PodcastFields
          }
        }
        pageInfo {
          ...PageInfoFields
        }
      }
      podcastEpisodes(first: $podcastEpisodesFirst) {
        edges {
          cursor
          node {
            ...PodcastEpisodeFields
          }
        }
        pageInfo {
          ...PageInfoFields
        }
      }
    }
  }
}
