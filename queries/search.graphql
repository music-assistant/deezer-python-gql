query Search(
  $query: String!
  $tracksFirst: Int = 20
  $albumsFirst: Int = 20
  $artistsFirst: Int = 20
  $playlistsFirst: Int = 10
) {
  search(query: $query) {
    results {
      tracks(first: $tracksFirst) {
        edges {
          cursor
          node {
            ...TrackFields
          }
        }
        pageInfo {
          ...PageInfoFields
        }
      }
      albums(first: $albumsFirst) {
        edges {
          cursor
          node {
            ...AlbumFields
          }
        }
        pageInfo {
          ...PageInfoFields
        }
      }
      artists(first: $artistsFirst) {
        edges {
          cursor
          node {
            ...ArtistFields
          }
        }
        pageInfo {
          ...PageInfoFields
        }
      }
      playlists(first: $playlistsFirst) {
        edges {
          cursor
          node {
            ...PlaylistFields
          }
        }
        pageInfo {
          ...PageInfoFields
        }
      }
    }
  }
}
