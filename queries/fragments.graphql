# Shared fragments for reuse across multiple queries.
# ariadne-codegen generates a fragments.py with Pydantic base classes
# that query response models inherit from via multiple inheritance.

# ---------------------------------------------------------------------------
# Track — lightweight fields for browse listings and playlist/album contents
# ---------------------------------------------------------------------------
fragment TrackFields on Track {
  id
  title
  ISRC
  diskInfo {
    diskNumber
    trackNumber
  }
  duration
  isExplicit
  isFavorite
  popularity
  album {
    id
    displayTitle
    cover {
      id
      urls(pictureRequest: { width: 264, height: 264 })
    }
  }
  contributors(first: 10, roles: [MAIN, FEATURED]) {
    edges {
      roles
      node {
        ... on Artist {
          id
          name
        }
      }
    }
  }
}

# ---------------------------------------------------------------------------
# Artist — lightweight fields for browse listings
# ---------------------------------------------------------------------------
fragment ArtistFields on Artist {
  id
  name
  picture {
    id
    urls(pictureRequest: { width: 264, height: 264 })
  }
  fansCount
  isFavorite
  bio {
    summary
    full
  }
}

# ---------------------------------------------------------------------------
# Album — lightweight fields for browse listings
# ---------------------------------------------------------------------------
fragment AlbumFields on Album {
  id
  displayTitle
  type
  cover {
    id
    urls(pictureRequest: { width: 264, height: 264 })
  }
  contributors(first: 5, roles: [MAIN]) {
    edges {
      node {
        ... on Artist {
          id
          name
        }
      }
    }
  }
  releaseDate
  isExplicit
  isFavorite
  fansCount
  label
  copyright
}

# ---------------------------------------------------------------------------
# Playlist — lightweight fields for browse listings
# ---------------------------------------------------------------------------
fragment PlaylistFields on Playlist {
  id
  title
  picture {
    id
    urls(pictureRequest: { width: 264, height: 264 })
  }
  estimatedTracksCount
  fansCount
  isFavorite
  description
  owner {
    id
    name
  }
}

# ---------------------------------------------------------------------------
# Livestream — lightweight fields for radio/livestream listings
# ---------------------------------------------------------------------------
fragment LivestreamFields on Livestream {
  id
  name
  language
  description
  isOnStream
  country
  cover {
    id
    urls(pictureRequest: { width: 264, height: 264 })
  }
  media {
    url
    codec {
      type
      bitrate
    }
  }
}

# ---------------------------------------------------------------------------
# Podcast — lightweight fields for podcast browse listings
# ---------------------------------------------------------------------------
fragment PodcastFields on Podcast {
  id
  displayTitle
  cover {
    id
    urls(pictureRequest: { width: 264, height: 264 })
  }
  description
  isExplicit
  isFavorite
  type
}

# ---------------------------------------------------------------------------
# PodcastEpisode — lightweight fields for episode listings
# ---------------------------------------------------------------------------
fragment PodcastEpisodeFields on PodcastEpisode {
  id
  title
  description
  duration
  cover {
    id
    urls(pictureRequest: { width: 264, height: 264 })
  }
  publicationDate
  media {
    url
    codec {
      type
      bitrate
    }
  }
}

# ---------------------------------------------------------------------------
# Audiobook — lightweight fields for audiobook browse listings
# ---------------------------------------------------------------------------
fragment AudiobookFields on Audiobook {
  id
  displayTitle
  cover(pictureRequest: { width: 264, height: 264 }) {
    id
    urls(pictureRequest: { width: 264, height: 264 })
  }
  description
  duration
  releaseDate
  fansCount
  isExplicit
  isFavorite
  chaptersCount
  discsCount
  producerLine
  publisher
  contributors(first: 5, roles: [AUTHOR, NARRATOR]) {
    edges {
      roles
      node {
        ... on Artist {
          id
          name
        }
      }
    }
  }
}

# ---------------------------------------------------------------------------
# AudiobookChapter — lightweight fields for chapter listings
# ---------------------------------------------------------------------------
fragment AudiobookChapterFields on AudiobookChapter {
  id
  isrc
  displayTitle
  diskInfo {
    diskNumber
    chapterPosition
  }
  duration
  isExplicit
  isFavorite
}

# ---------------------------------------------------------------------------
# PageInfo — standard Relay pagination info
# ---------------------------------------------------------------------------
fragment PageInfoFields on PageInfo {
  hasNextPage
  endCursor
}
