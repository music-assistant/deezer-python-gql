query GetArtist($artistId: String!) {
  artist(artistId: $artistId) {
    ...ArtistFields
    url {
      ... on Url {
        webUrl
      }
    }
    topTracks(first: 50) {
      edges {
        cursor
        node {
          ...TrackFields
        }
      }
      pageInfo {
        ...PageInfoFields
      }
    }
    albums(types: [ALBUM, SINGLES, EP], order: RELEASE_DATE, first: 25) {
      edges {
        cursor
        node {
          ...AlbumFields
          tracksCount
        }
      }
      pageInfo {
        ...PageInfoFields
      }
    }
  }
}
